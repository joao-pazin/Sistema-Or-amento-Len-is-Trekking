<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Proposta — Lençóis Trekking</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}

/* ── Tela: fundo cinza, cada .pg simula folha A4 centralizada ── */
html,body{background:#888;font-family:'DM Sans',sans-serif;color:#1a1a1a;font-size:10pt;line-height:1.5;margin:0;padding:0}

.pg{
  width:210mm;
  min-height:297mm;
  background:#f8f1e4;
  margin:0 auto 8px;
  overflow:hidden;
  position:relative;
}

/* ── Print ──
   Estratégia: deixar o @page controlar as margens.
   O .pg ocupa 100% da área útil — sem width fixo, sem vw.
   O body tem padding:0 e o @page define margin:10mm simétrico.
   Assim as margens são idênticas dos dois lados, controladas pelo browser.
*/
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}

  @page{
    size:A4;
    margin:0;
  }

  html,body{
    margin:0!important;
    padding:0!important;
    background:#f8f1e4!important;
    width:100%!important;
  }

  .pg{
    page-break-after:always;
    break-after:page;
    width:100%!important;
    max-width:100%!important;
    min-height:100vh!important;
    margin:0!important;
    background:#f8f1e4!important;
    position:relative;
    overflow:visible;
  }

  .volta,.volta-aviso-el,#ios-dica{display:none!important}

  .pdf-capa,.pdf-dia-hdr{
    -webkit-print-color-adjust:exact!important;
    print-color-adjust:exact!important;
  }
}

/* ── Botão voltar ── */
.volta{display:block;background:#e8601c;color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;padding:14px 24px;text-align:center;cursor:pointer;border:none;width:100%;margin-bottom:8px}

/* ── Componentes do PDF ── */
/* Margem interna: usamos valor fixo mas igual nos dois lados */
.pdf-capa{background:linear-gradient(135deg,#e8601c,#b84510);padding:22px 32px;display:flex;align-items:center;gap:12px}
.pdf-logo-c{width:44px;height:44px;border-radius:50%;background:#fff;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.pdf-logo-c img{width:100%;height:100%;object-fit:contain}
.pdf-capa-h2{font-family:'Playfair Display',serif;font-size:13pt;color:#fff}
.pdf-capa-p{font-size:9pt;color:rgba(255,255,255,.8);margin-top:1px}
.pdf-badge{display:inline-block;background:#fff;color:#e8601c;font-size:8.5pt;font-weight:700;padding:3px 10px;border-radius:12px;margin-top:7px}
.pdf-s{padding:10px 32px;border-bottom:1px solid #e0d8cc}
.pdf-s:last-child{border-bottom:none}
.pdf-tag{background:#e8601c;color:#fff;font-size:8.5pt;font-weight:700;letter-spacing:.3px;padding:4px 9px;border-radius:3px;display:inline-block;margin-bottom:8px}
.pt{width:100%;border-collapse:collapse;font-size:8.5pt}
.pt th{color:#888;font-weight:600;text-transform:uppercase;font-size:7.5pt;letter-spacing:.3px;padding:4px 5px;border-bottom:1px solid #ddd;text-align:left}
.pt td{padding:5px 5px;border-bottom:1px solid #eee;vertical-align:top}
.pt tr:last-child td{border-bottom:none}
.pdf-p-lbl{font-size:8.5pt;color:#888;text-transform:uppercase;letter-spacing:.3px}
.pdf-p-val{font-family:'Playfair Display',serif;font-size:17pt;color:#e8601c;font-weight:700}
.pdf-ul{list-style:none;font-size:8.5pt;color:#444}
.pdf-ul li{padding:2px 0}
.pdf-ul li::before{content:'→ ';color:#e8601c;font-weight:700}
.pdf-dia-hdr{background:linear-gradient(135deg,#e8601c,#b84510);padding:14px 32px;border-radius:0;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.pdf-rdp{font-size:8pt;color:#aaa}
</style>
<script src="dados.js"></script>
</head>
<body>
<button class="volta" onclick="history.back()">← Voltar ao sistema</button>
<div id="ios-dica" style="display:none;background:#1a1a1a;color:#f0e8dc;font-family:'DM Sans',sans-serif;font-size:13px;padding:12px 20px;text-align:center;line-height:1.5">
  📱 <strong>Para salvar sem bordas brancas:</strong> use o ícone de compartilhar (⬆) e escolha <strong>"Salvar em PDF"</strong> — em vez de Imprimir.
</div>
<script>
// Detecta Safari iOS e mostra dica alternativa
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
if(isIOS && isSafari) document.getElementById('ios-dica').style.display='block';
</script>
<div id="conteudo"></div>
<script>
// LOGO, ROT e HOSP carregados via dados.js

const raw = sessionStorage.getItem('lt_pdf_dados');
if(!raw){document.getElementById('conteudo').innerHTML='<p style="padding:40px;font-family:sans-serif">Dados não encontrados. <a href="index.html">Voltar ao sistema</a></p>';}
else{
  const D=JSON.parse(raw);
  const R=v=>'R$ '+Math.round(v).toLocaleString('pt-BR');
  const fmtD=(ds,off)=>{if(!ds)return'—';const d=new Date(ds+'T12:00:00');d.setDate(d.getDate()+off);return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'})};
  const thumb=id=>`https://drive.google.com/thumbnail?id=${id}&sz=w800`;

  // recalcula
  let cp=0,ct=0,ch=0;const avisos=[];
  const det=D.dias.map((d,i)=>{
    const r=ROT.find(x=>x.id===d.rot),h=HOSP.find(x=>x.id===d.hosp);
    let raw=null;
    if(D.car==='agencia'){const f=Math.min(Math.max(D.np,3),16);raw=r.ag[f];}
    else raw=D.sub==='c4'?r.c4:r.c8;
    const semPreco=raw===null||raw===undefined;
    let vp=semPreco?0:raw;
    if(semPreco)avisos.push(`Dia ${i+1}: ${r.nome}`);
    // Extra Pantanal Marimbus: +R$200 a cada 4 pax
    if(r.id===5) vp+=Math.ceil(D.np/4)*200;
    // Extra Cachoeira do Buracão: +R$280 a cada 6 pax
    if(r.id===10) vp+=Math.ceil(D.np/6)*280;
    const vt=(r.taxa||0)*D.np;
    let vh=h.g||0;d.qts.forEach(q=>{vh+=(q.t==='single'?h.s:q.t==='casal'?h.c:h.t||0)*q.q});
    cp+=vp;ct+=vt;ch+=vh;
    return{i:i+1,r,h,d,vp,vt,vh,semPreco};
  });
  const tot=cp+ct+ch,ppp=D.np>0?Math.ceil(tot*(1+D.mk/100)/D.np/100)*100:0;
  const temHosp=det.some(d=>d.vh>0);
  const badge=D.nome?(D.di?`${D.nome} — ${fmtD(D.di,0)} → ${D.df?fmtD(D.df,0):'?'}`:D.nome):'Novo Roteiro';

  const alertaBanner=avisos.length?`
    <div style="background:#fff3cd;border:1.5px solid #e8601c;border-radius:6px;padding:10px 14px;margin:10px 32px;font-family:'DM Sans',sans-serif;font-size:8.5pt;color:#7a3a00;display:none" class="volta-aviso">
      <strong>&#9888; ATENÇÃO — Preço incompleto:</strong> os passeios abaixo não têm preço cadastrado para ${D.np} pessoas e foram contabilizados como R$0:<br>
      ${avisos.map(a=>`<span style="display:block;margin-top:3px">• ${a}</span>`).join('')}
      <span style="color:#a05010;display:block;margin-top:5px">Volte ao sistema, ajuste o número de pessoas ou substitua o passeio antes de enviar ao cliente.</span>
    </div>`:'';
  if(alertaBanner){
    const el=document.createElement('div');
    el.innerHTML=alertaBanner;
    const avEl=el.firstElementChild;
    avEl.style.display='block';
    document.querySelector('.volta').insertAdjacentElement('afterend',avEl);
  }

  // ── Internacionalização ──
  const EN = D.nac === 'EX';
  const T = {
    subtagline:     EN ? 'Life begins off the beaten path'   : 'A vida começa fora da rota',
    descricaoRoteiro: EN ? 'ITINERARY'                       : 'DESCRIÇÃO DO ROTEIRO',
    colData:        EN ? 'DATE'    : 'DATA',
    colPasseio:     EN ? 'TOUR'    : 'PASSEIO',
    colPousada:     EN ? 'ACCOMMODATION' : 'POUSADA',
    colCidade:      EN ? 'CITY'    : 'CIDADE',
    precoTag:       EN ? 'PRICE & PAYMENT'   : 'PREÇO E PAGAMENTO',
    precoPorPessoa: EN ? 'PRICE PER PERSON'  : 'PREÇO POR PESSOA',
    precoTexto:     EN ? 'To book, a deposit of <strong>30%</strong> of the total amount is required.<br>The remaining balance must be paid up to <strong>10 days before</strong> the trip starts.<br><br>We accept: Bank Transfer · Credit card up to 6x (+5%) · PIX'
                       : 'Para reserva, é necessário o pagamento de <strong>30%</strong> do valor total.<br>O saldo restante deverá ser pago até <strong>10 dias antes</strong> do início da viagem.<br><br>Aceitamos: PIX · Transferência · Cartão em até 6x (+5%) · Parcelamento no PIX',
    condicoesGerais: EN ? 'GENERAL CONDITIONS'   : 'CONDIÇÕES GERAIS',
    infoImp:        EN ? 'Important Information' : 'Informações Importantes',
    inclusoTag:     EN ? 'INCLUDED / NOT INCLUDED' : 'INCLUSO / NÃO INCLUSO',
    inclusoItems:   EN ? ['Experienced guide','ROCA Adventure Insurance','Entrance fees to attractions', D.car==='agencia' ? 'Transport in agency vehicle' : "Transport in client's own vehicle"]
                       : ['Guia experiente','Seguro Aventura ROCA','Taxa de entrada nos atrativos', D.car==='agencia' ? 'Transporte em carro da agência' : 'Transporte em carro próprio do viajante'],
    hospedagemItem: EN ? 'Accommodation as per itinerary' : 'Hospedagem conforme roteiro',
    checkinTag:     EN ? 'CHECK-IN / CHECK-OUT' : 'CHECK-IN / CHECK-OUT',
    checkinTexto:   EN ? 'If accommodation is included in your package, <strong>Check-in is at 2:00 PM</strong> and <strong>Check-out at 12:00 PM</strong>.<br>If you arrive before 2:00 PM, please let us know so we can notify the property — they will store your luggage and may offer an extra breakfast on check-in day (to be paid directly to the property).'
                       : 'Caso haja hospedagem inclusa em seu pacote, o horário de <strong>Check-in é 14:00h</strong> e o de <strong>Check-out 12:00h</strong>.<br>Caso o viajante chegue antes de 14:00h, por favor nos informar para avisarmos a hospedagem, que guardará seus pertences e também oferecerá um café da manhã extra no dia do check-in (a ser pago diretamente para a pousada).',
    cancelTag:      EN ? 'CANCELLATION POLICY' : 'POLÍTICA DE CANCELAMENTO',
    cancelItems:    EN ? ['Up to 60 days before the start of the itinerary, we will refund the full deposit paid.','If a traveler wishes to change or cancel a booked tour, the request must be made at least 60 days in advance. Changes are subject to availability, with price differences settled. After 60 days, no refunds are issued.']
                       : ['Com até 60 dias de antecedência do início do roteiro, devolveremos o valor total pago para reserva.','O viajante que desejar trocar ou cancelar algum passeio já reservado, precisará solicitar a troca com no mínimo 60 dias de antecedência. A troca será feita com acerto da diferença de valores, se tivermos disponibilidade. Após 60 dias, não há devolução de quantia paga.'],
    obsTitle:       EN ? 'Notes' : 'Observações',
    obsItems:       EN ? ['Tours are conducted in groups.','The order of tours or the tours themselves may be changed due to force majeure (rain, road conditions) to ensure maximum safety, or to coordinate schedules with other travelers.','Accommodations in the southern Chapada area may be modified due to force majeure or availability at partner properties.']
                       : ['Os passeios são em grupos.','A ordem dos passeios ou o próprio passeio poderá ser alterado por motivos de força maior (chuva, condições de estrada) visando oferecer máxima segurança, ou para casamento de datas com outros viajantes.','As hospedagens na região sul da Chapada podem ser modificadas por motivos de força maior ou disponibilidade nas pousadas parceiras.'],
    diaLabel:       EN ? 'DAY'      : 'DIA',
    hospNoite:      EN ? 'OVERNIGHT ACCOMMODATION' : 'HOSPEDAGEM DA NOITE',
    rodape:         EN ? 'Lençóis Trekking · Life begins off the beaten path' : 'Lençóis Trekking · A vida começa fora da rota',
    paginaDe:       (n,t) => EN ? `Page ${n} of ${t}` : `Página ${n} de ${t}`,
  };

  // PÁGINA 1 — CAPA COMPLETA
  const totalPags = det.length + 2; // capa + condições + 1 por dia

  // ── PÁGINA 1: CAPA + ROTEIRO + PREÇO ──
  let html=`<div class="pg">
  <div class="pdf-capa">
    <div class="pdf-logo-c"><img src="${LOGO}" onerror="this.style.display='none'"></div>
    <div><div class="pdf-capa-h2">LENÇÓIS TREKKING</div>
    <div class="pdf-capa-p">${T.subtagline}</div>
    <div class="pdf-badge">${badge}</div></div>
  </div>
  <div class="pdf-s">
    <div class="pdf-tag">${T.descricaoRoteiro}</div>
    <table class="pt"><thead><tr><th>${T.colData}</th><th>${T.colPasseio}</th><th>${T.colPousada}</th><th>${T.colCidade}</th></tr></thead>
    <tbody>${det.map(d=>`<tr><td>${fmtD(D.di,d.i-1)}</td><td>${EN?d.r.nomeEn:d.r.nome}</td><td>${d.h.nome}</td><td>${d.h.local}</td></tr>`).join('')}</tbody></table>
  </div>
  <div class="pdf-s">
    <div class="pdf-tag">${T.precoTag}</div>
    <div class="pdf-p-lbl">${T.precoPorPessoa}</div>
    <div class="pdf-p-val">${R(ppp)}</div>
    <div style="font-size:8.5pt;color:#555;margin-top:6px">${T.precoTexto}</div>
  </div>
  <div style="position:absolute;bottom:38px;left:32px;right:32px;height:220px;border-radius:8px;overflow:hidden">
    <img src="https://drive.google.com/thumbnail?id=1zkh_LohB_rA1H9ulYaqAmY1Ud7hry4mD&sz=w1200" style="width:100%;height:100%;object-fit:cover;display:block" onerror="this.parentElement.style.display='none'">
  </div>
  <div style="position:absolute;bottom:14px;left:32px;right:32px;display:flex;justify-content:space-between;border-top:1px solid #e0d8cc;padding-top:6px">
    <span class="pdf-rdp">${T.rodape}</span>
    <span class="pdf-rdp">${T.paginaDe(1,totalPags)}</span>
  </div>
  </div>

  <!-- ── PÁGINA 2: CONDIÇÕES GERAIS ── -->
  <div class="pg" style="padding:28px 32px 50px">
  <div style="background:linear-gradient(135deg,#e8601c,#b84510);padding:12px 32px;margin-bottom:16px">
    <div style="font-size:7.5pt;color:rgba(255,255,255,.8);text-transform:uppercase;letter-spacing:.5px;font-weight:700">${T.condicoesGerais}</div>
    <div style="font-family:'Playfair Display',serif;font-size:11pt;color:#fff;margin-top:1px">${T.infoImp}</div>
  </div>
  <div class="pdf-s">
    <div class="pdf-tag">${T.inclusoTag}</div>
    <ul class="pdf-ul">
      ${T.inclusoItems.map(i=>`<li>${i}</li>`).join('')}
      ${temHosp?`<li>${T.hospedagemItem}</li>`:''}
    </ul>
  </div>
  <div class="pdf-s">
    <div class="pdf-tag">${T.checkinTag}</div>
    <div style="font-size:8.5pt;color:#444;line-height:1.5">${T.checkinTexto}</div>
  </div>
  <div class="pdf-s">
    <div class="pdf-tag">${T.cancelTag}</div>
    <div style="font-size:8.5pt;color:#444;line-height:1.6">
      <ul class="pdf-ul" style="margin-bottom:5px">
        ${T.cancelItems.map(i=>`<li>${i}</li>`).join('')}
      </ul>
      <div style="font-weight:700;color:#1a1a1a;margin-top:5px;margin-bottom:3px">${T.obsTitle}</div>
      <ul class="pdf-ul">
        ${T.obsItems.map(i=>`<li>${i}</li>`).join('')}
      </ul>
    </div>
  </div>
  <div style="position:absolute;bottom:14px;left:32px;right:32px;display:flex;justify-content:space-between;border-top:1px solid #e0d8cc;padding-top:6px">
    <span class="pdf-rdp">${T.rodape}</span>
    <span class="pdf-rdp">${T.paginaDe(2,totalPags)}</span>
  </div>
  </div>`;

  // PÁGINAS POR DIA
  det.forEach(d=>{
    const fotos=d.r.fotos||[];
    const fotoHtml=fotos.length===0?'':fotos.length===1?
      `<div style="width:100%;height:420px;overflow:hidden;border-radius:5px;margin-bottom:10px"><img src="${thumb(fotos[0])}" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.style.display='none'"></div>`:
      fotos.length===2?
      `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">${fotos.map(fid=>`<div style="height:330px;overflow:hidden;border-radius:5px"><img src="${thumb(fid)}" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.style.display='none'"></div>`).join('')}</div>`:
      fotos.length===3?
      `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px"><div style="height:280px;overflow:hidden;border-radius:5px"><img src="${thumb(fotos[0])}" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.style.display='none'"></div><div style="display:grid;grid-template-rows:1fr 1fr;gap:8px"><div style="height:136px;overflow:hidden;border-radius:5px"><img src="${thumb(fotos[1])}" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.style.display='none'"></div><div style="height:136px;overflow:hidden;border-radius:5px"><img src="${thumb(fotos[2])}" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.style.display='none'"></div></div></div>`:
      `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">${fotos.slice(0,2).map(fid=>`<div style="height:264px;overflow:hidden;border-radius:5px"><img src="${thumb(fid)}" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.style.display='none'"></div>`).join('')}</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">${fotos.slice(2,4).map(fid=>`<div style="height:264px;overflow:hidden;border-radius:5px"><img src="${thumb(fid)}" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.style.display='none'"></div>`).join('')}</div>`;

    html+=`<div class="pg" style="padding:28px 32px 50px">
      <div class="pdf-dia-hdr">
        <div><div style="font-size:8pt;color:rgba(255,255,255,.8);text-transform:uppercase;letter-spacing:.5px;font-weight:700">${T.diaLabel} ${d.i}</div>
        <div style="font-family:'Playfair Display',serif;font-size:18pt;color:#fff;margin-top:2px;line-height:1.2">${EN?d.r.nomeEn:d.r.nome}</div></div>
        <div style="text-align:right;font-size:8pt;color:rgba(255,255,255,.85)">${fmtD(D.di,d.i-1)}</div>
      </div>
      ${fotoHtml}
      <div style="font-size:9pt;color:#333;white-space:pre-line;margin-bottom:10px;line-height:1.6">${EN?d.r.en:d.r.pt}</div>
      ${d.h.id!==20?`<div style="background:#f0ece4;border:1px solid #e0d8cc;border-radius:5px;padding:10px 14px;margin-top:8px">
        <div style="font-size:7.5pt;font-weight:700;color:#e8601c;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px">🏨 ${T.hospNoite}</div>
        <div style="font-size:9pt;font-weight:600;color:#1a1a1a">${d.h.nome}</div>
        <div style="font-size:8pt;color:#666;margin-top:2px">${d.h.local} · ${d.d.qts.map(q=>`${q.q}x ${q.t}`).join(', ')}</div>
      </div>`:''}
      <div style="position:absolute;bottom:14px;left:32px;right:32px;display:flex;justify-content:space-between;border-top:1px solid #e0d8cc;padding-top:6px">
        <span class="pdf-rdp">${T.rodape}</span>
        <span class="pdf-rdp">${T.paginaDe(d.i+2,totalPags)}</span>
      </div>
    </div>`;
  });

  document.getElementById('conteudo').innerHTML=html;
}
</script>
</body>
</html>
