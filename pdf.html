<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proposta — Lençóis Trekking</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
@page{margin:0;background:#f8f1e4}
html,body{background:#f8f1e4;font-family:'DM Sans',sans-serif;color:#1a1a1a;font-size:10pt;line-height:1.5}
.pdf-capa{background:linear-gradient(135deg,#e8601c,#b84510);padding:18px 32px;display:flex;align-items:center;gap:12px}
.pdf-logo-c{width:40px;height:40px;border-radius:50%;background:#fff;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.pdf-logo-c img{width:100%;height:100%;object-fit:contain}
.pdf-capa-h2{font-family:'Playfair Display',serif;font-size:13pt;color:#fff}
.pdf-capa-p{font-size:10pt;color:rgba(255,255,255,.8);margin-top:1px}
.pdf-badge{display:inline-block;background:#fff;color:#e8601c;font-size:9pt;font-weight:700;padding:3px 10px;border-radius:12px;margin-top:7px}
.pdf-s{padding:13px 32px;border-bottom:1px solid #e0d8cc}
.pdf-s:last-child{border-bottom:none}
.pdf-tag{background:#e8601c;color:#fff;font-size:9pt;font-weight:700;letter-spacing:.3px;padding:4px 9px;border-radius:3px;display:inline-block;margin-bottom:9px}
.pt{width:100%;border-collapse:collapse;font-size:9pt}
.pt th{color:#888;font-weight:600;text-transform:uppercase;font-size:8pt;letter-spacing:.3px;padding:4px 5px;border-bottom:1px solid #ddd;text-align:left}
.pt td{padding:5px 5px;border-bottom:1px solid #eee;vertical-align:top}
.pt tr:last-child td{border-bottom:none}
.pdf-p-lbl{font-size:9pt;color:#888;text-transform:uppercase;letter-spacing:.3px}
.pdf-p-val{font-family:'Playfair Display',serif;font-size:17pt;color:#e8601c;font-weight:700}
.pdf-ul{list-style:none;font-size:9pt;color:#444}
.pdf-ul li{padding:2px 0}
.pdf-ul li::before{content:'→ ';color:#e8601c;font-weight:700}
.pdf-page-dia{page-break-before:always;padding:24px 32px;background:#f8f1e4}
.volta{display:block;background:#e8601c;color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;padding:14px 24px;text-align:center;text-decoration:none;cursor:pointer;border:none;width:100%}
@media print{.volta{display:none!important}}
</style>
</head>
<body>
<button class="volta" onclick="history.back()">← Voltar ao sistema</button>
<div id="conteudo"></div>
<script>
const LOGO="https://drive.google.com/thumbnail?id=1WxYc1wY2unzoHDr2quB3eJwQDK-GgzRP&sz=h80";
const ROT=[{id:1,nome:"Cachoeira do Mosquito, Poço do Diabo e Morro do Pai Inácio",pt:"Saímos de Lençóis por 40 minutos de carro até a entrada da Cachoeira do Mosquito. Fazemos uma trilha curta até a queda e após o banho almoçamos no restaurante da fazenda do Mosquito. Depois seguimos para o Poço do Diabo, um dos maiores poços da Chapada Diamantina. No final do dia, vemos o pôr do sol no Morro do Pai Inácio.\nSaída: 9h | Retorno: 18:30h",taxa:70,fotos:["1Rcqtutp8jzb1eWkGW0UdZ8Pnx3L7FvBI","1Bg3zY_N9kEngAe1FtBAYKsVEu3c0fjgL"],c4:200,c8:400,ag:{3:580,4:580,5:700,6:780,7:1160,8:1160,9:1280,10:1400,11:1480,12:1560,13:1740,14:1740,15:1740,16:1740}},{id:2,nome:"Gruta da Lapa Doce + Fazenda Pratinha",pt:"Sairemos de Lençóis por 2 horas até a Gruta da Lapa Doce, onde caminharemos por 1 hora dentro da gruta observando estalactites e estalagmites. Em seguida, 20 minutos de carro até a Fazenda Pratinha, um lençol freático de água cristalina em meio ao sertão baiano.\nSaída: 8:30h | Retorno: 17:30h | Total: 2km",taxa:146,fotos:["1_r97pHhdRYaY82Qe0KDnuEYoM3SixJv7","1o4sRe7M4fuVfyTROW6eKPfYx91lb3FNM"],c4:200,c8:400,ag:{3:530,4:530,5:700,6:730,7:1060,8:1060,9:1230,10:1400,11:1430,12:1460,13:1590,14:1590,15:1590,16:1590}},{id:3,nome:"Buracão + Fumacinha + Poços",pt:"Saída de Lençóis às 6am por 4 horas de carro até Ibicoara. Nadamos em uma fenda mágica para chegar na Cachoeira do Buracão (90m). 2º dia: trilha técnica até a Fumacinha (18km, avançado). 3º dia: Poço Encantado e Poço Azul.",taxa:0,fotos:[],c4:850,c8:1700,ag:{3:2150,4:2150,5:2850,6:2850,7:5700,8:5700,9:5000,10:5700,11:5700,12:5700,13:6450,14:6450,15:6450,16:6450}},{id:4,nome:"Parque da Muritiba (sem carro)",pt:"O Parque Municipal da Muritiba fica dentro da cidade de Lençóis. Damos a volta ao Parque passando por: Piscinas do Serrano, Poço Halley, Salões de areias coloridas, Cachoeira da Primavera, Mirante de Lençóis e Cachoeirinha.\nSaída: 9:30h | Retorno: 16h | Total: 5km",taxa:20,fotos:["13XFhhDyH-3BIM9bZGFxWa4qwqBF8TsXd"],c4:180,c8:360,ag:{3:180,4:180,5:180,6:180,7:360,8:360,9:360,10:360,11:360,12:360,13:540,14:540,15:540,16:540}},{id:5,nome:"Pantanal Marimbus + Rio Roncador",pt:"Saimos de Lençóis às 8:30 por 40 minutos até a Comunidade Quilombola do Remanso. Pegamos o barco para descer o rio em meio a Palmeiras de Licuri e espelhos d'água magníficos. Após 1 hora de remada, caminhamos 30 minutos até as piscinas naturais do Rio Roncador.\nSaída: 8:30 | Retorno: 17h | Total 6km",taxa:40,fotos:["1THQUibv8X_Rv8Z7IMFe3uF5vEwQnKyGQ"],c4:200,c8:400,ag:{3:530,4:530,5:700,6:730,7:1060,8:1060,9:1230,10:1400,11:1430,12:1460,13:1590,14:1590,15:1590,16:1590}},{id:6,nome:"Cachoeira da Fumaça + Riachinho",pt:"Saída de Lençóis por 1h30m de carro até o início da trilha da Fumaça. Ida e volta somam 12km. Chegaremos na visão da Fumaça por cima, a maior cachoeira do Brasil. Ao fim do dia, pôr do sol no Riachinho.\nSaída: 8h | Retorno: 18h | Total 12km",taxa:20,fotos:[],c4:270,c8:540,ag:{3:700,4:700,5:850,6:1000,7:1400,8:1400,9:1550,10:1700,11:1850,12:2000,13:2100,14:2100,15:2100,16:2100}},{id:7,nome:"Poço Azul e Poço Encantado",pt:"Saída por 2 horas de carro até o Poço Encantado (60m, sem banho, proibido menores de 12 anos). Depois seguimos para o Poço Azul, onde mergulhamos com snorkel e colete fornecidos.\nSaída 8:30 | Retorno 17h | Total 1km",taxa:124.5,fotos:["1zsswRfj2i2QQya5ys8G3e4Dups0HkKTo"],c4:250,c8:500,ag:{3:630,4:630,5:800,6:930,7:1260,8:1260,9:1890,10:1890,11:1890,12:1890,13:2520,14:2520,15:2520,16:2520}},{id:8,nome:"Cachoeira do Sossego + Ribeirão do Meio (sem carro)",pt:"Trilha que começa dentro de Lençóis, com passagens no leito do rio e dentro de um cânion até a Cachoeira do Sossego (60m). No retorno, paramos no Ribeirão do Meio, o tobogã natural da Chapada.",taxa:0,fotos:[],c4:250,c8:500,ag:{3:250,4:250,5:500,6:500,7:500,8:500,9:750,10:750,11:750,12:750,13:1000,14:1000,15:1000,16:1000}},{id:9,nome:"Vale do Pati 3 dias",pt:"Roteiro circular no Trekking mais visitado do Brasil. 3 dias trilhando entre grutas, mirantes e cachoeiras, dormindo na casa dos nativos. Saímos de Lençóis às 7h de carro por 2 horas até a vila da Guiné. Incluso: guia, transporte, hospedagem nas casas dos nativos e toda a comida.",taxa:0,fotos:[],c4:960,c8:1920,ag:{3:1600,4:1600,5:3200,6:3200,7:3200,8:3200,9:4800,10:4800,11:4800,12:4800,13:6400,14:6400,15:6400,16:6400}},{id:10,nome:"Cachoeira do Buracão",pt:"Saindo de Lençóis, são 4 horas de viagem até Ibicoara para visitar a Cachoeira do Buracão. Para chegarmos até a imponente queda de 90 metros, nadamos em uma fenda mágica com coletes fornecidos.\nTotal 6km",taxa:30,fotos:["1RAWUnQj36OQ_fMhx4pvmZSDlypi3HoFc"],c4:300,c8:600,ag:{3:700,4:700,5:1000,6:1000,7:1400,8:1400,9:2100,10:2100,11:2100,12:2100,13:2800,14:2800,15:2800,16:2800}},{id:11,nome:"Cachoeira da Fumacinha",pt:"Localizada em Ibicoara, trilha técnica e incrível acompanhando o leito do rio com várias cachoeiras até chegar na Fumacinha com 105 metros de altura, dentro de um cânion fechado parecendo um Santuário.\nTotal 18km",taxa:0,fotos:["1u0Kgjh_IPmSNUTQtl-wmR06n5o8ThCh2"],c4:360,c8:720,ag:{3:700,4:700,5:1000,6:1000,7:1400,8:1400,9:2100,10:2100,11:2100,12:2100,13:2800,14:2800,15:2800,16:2800}},{id:12,nome:"Vale do Pati",pt:"Roteiro no Trekking mais visitado do Brasil. Trilhando entre grutas, mirantes e cachoeiras, sem sinal, dormindo na casa dos nativos. Saímos de Lençóis às 7h de carro por 2 horas até a vila da Guiné. Incluso: guia, transporte, hospedagem e toda a comida preparada pelos nativos!",taxa:0,fotos:[],c4:320,c8:640,ag:{3:533,4:533,5:1067,6:1067,7:1067,8:1067,9:1600,10:1600,11:1600,12:1600,13:2133,14:2133,15:2133,16:2133}},{id:13,nome:"Águas Claras",pt:"Saída de Lençóis por 30 minutos de carro até o início da trilha. Ida e volta somam 18km, todos planos e entre o Vale dos 3 Irmãos, com um visual magnífico. Chegaremos nas piscinas naturais de água cristalina de frente para o Morrão.",taxa:0,fotos:[],c4:270,c8:540,ag:{3:630,4:630,5:800,6:800,7:1260,8:1260,9:1430,10:1600,11:1600,12:1600,13:1890,14:1890,15:1890,16:1890}},{id:14,nome:"Dia Livre",pt:"Sem roteiro programado. Dia para descanso, exploração independente da cidade histórica de Lençóis, compras de artesanato local ou banho no Rio Lençóis.",taxa:0,fotos:[],c4:0,c8:0,ag:{3:0,4:0,5:0,6:0,7:0,8:0,9:0,10:0,11:0,12:0,13:0,14:0,15:0,16:0}},{id:15,nome:"Conceição dos Gatos e Lagoa dos Patos",pt:"Imersão na tranquilidade da Chapada Diamantina passando por pequenas comunidades rurais. Seguimos até a Lagoa dos Patos, uma pequena cachoeira com águas calmas e cristalinas.\nTotal 3km",taxa:20,fotos:[],c4:300,c8:600,ag:{3:600,4:600,5:null,6:null,7:null,8:null,9:null,10:null,11:null,12:null,13:null,14:null,15:null,16:null}},{id:16,nome:"Rodas e Rio Preto",pt:"Trilha leve cercada por vegetação nativa até o Rio Preto, rio de águas escuras perfeito para um banho. O passeio passa pela comunidade de Rodas.\nInício 9h | Fim 17h | Total 8km",taxa:0,fotos:[],c4:300,c8:600,ag:{3:600,4:600,5:null,6:null,7:null,8:null,9:null,10:null,11:null,12:null,13:null,14:null,15:null,16:null}},{id:17,nome:"Caverna Torrinha, Fazenda Pratinha e Morro do Camelo",pt:"Viagem de 1h30 até a Caverna da Torrinha, caminhada guiada de 1h30 explorando flores de aragonita e agulhas de gipsita. Seguimos 20 minutos até a Fazenda Pratinha. No retorno, parada no Mirante do Camelo.\nSaída: 8h30 | Retorno: 18h | Total 2km",taxa:170,fotos:[],c4:null,c8:0,ag:{3:500,4:500,5:700,6:null,7:null,8:null,9:null,10:null,11:null,12:null,13:null,14:null,15:null,16:null}},{id:18,nome:"Vinícola UVVA",pt:"Sairemos de Mucugê por volta de 11h por 1 hora de carro para a experiência de degustação dos vinhos da Vinícola UVVA. Opção de restaurante para almoço. No final do dia retornaremos a Lençóis.",taxa:0,fotos:[],c4:null,c8:0,ag:{3:600,4:600,5:null,6:null,7:null,8:null,9:null,10:null,11:null,12:null,13:null,14:null,15:null,16:null}},{id:19,nome:"Lapa Doce, Vale das Piscinas e Morro do Camelo",pt:"Nos deslocamos por 1h30 até a Gruta da Lapa Doce. Caminhamos 40 minutos dentro da caverna. Seguimos para o Vale das Piscinas no Rio Mucugezinho. Finalizamos o dia no Morro do Camelo, um mirante surpreendente com lindo pôr do sol.\nSaída: 08:30 | Retorno: 18:00 | Total: 2km",taxa:56,fotos:["1F9zokJ4BndT_1gDth75NTBkE3YIsfmI4"],c4:null,c8:0,ag:{3:580,4:580,5:700,6:780,7:1160,8:1160,9:null,10:null,11:null,12:null,13:null,14:1740,15:1740,16:null}},{id:20,nome:"Passeio a Cavalo",pt:"Vamos cavalgar por 9km atravessando córregos lindíssimos, em um caminho de terra quase todo sombreado. Fazemos uma parada na beira do Rio Capivara para banho e lanche. Jordélio, o responsável, acompanha o tempo todo.",taxa:0,fotos:[],c4:null,c8:0,ag:{3:400,4:800,5:1200,6:1600,7:4000,8:4400,9:null,10:null,11:null,12:null,13:null,14:null,15:null,16:null}}];
const HOSP=[{id:1,nome:"Pousada Pouso da Trilha",local:"Lençóis",s:282,c:332,t:298,g:0},{id:2,nome:"Hotel Canto das Águas",local:"Lençóis",s:0,c:0,t:1751,g:0},{id:3,nome:"Pousada Recanto dos Mineiros",local:"Lençóis",s:160,c:200,t:270,g:0},{id:4,nome:"Pousada Kabana de Pedra",local:"Ibicoara",s:135,c:200,t:330,g:45},{id:5,nome:"Agnaldo",local:"Pati",s:200,c:400,t:600,g:0},{id:6,nome:"Casa de Dona Bia",local:"Ibicoara",s:170,c:340,t:510,g:0},{id:7,nome:"Pousada Mucugê",local:"Mucugê",s:180,c:290,t:360,g:100},{id:8,nome:"Pousada Monte Azul",local:"Mucugê",s:0,c:330,t:0,g:100},{id:9,nome:"Igrejinha",local:"Pati",s:200,c:400,t:600,g:0},{id:10,nome:"Zé Preto",local:"Pati",s:230,c:460,t:690,g:0},{id:11,nome:"Dona Linda",local:"Pati",s:215,c:430,t:645,g:0},{id:12,nome:"Pousada Vila Serrano",local:"Lençóis",s:406,c:451,t:667,g:0},{id:13,nome:"Seu Eduardo",local:"Pati",s:230,c:460,t:690,g:0},{id:14,nome:"Casa da VAL",local:"Ibicoara",s:170,c:340,t:510,g:0},{id:15,nome:"Pousada do Jairo",local:"Ibicoara",s:180,c:250,t:345,g:0},{id:16,nome:"Prefeitura",local:"Pati",s:230,c:460,t:690,g:0},{id:17,nome:"Pousada To em Casa",local:"Lençóis",s:175,c:210,t:295,g:0},{id:18,nome:"Hotel de Lençóis",local:"Lençóis",s:490,c:600,t:987,g:0},{id:19,nome:"Refúgio na Serra",local:"Mucugê",s:1580,c:1580,t:0,g:0},{id:20,nome:"— Sem hospedagem —",local:"",s:0,c:0,t:0,g:0}];

const raw = sessionStorage.getItem('lt_pdf_dados');
if(!raw){document.getElementById('conteudo').innerHTML='<p style="padding:40px;font-family:sans-serif">Dados não encontrados. <a href="index.html">Voltar ao sistema</a></p>';}
else{
  const D=JSON.parse(raw);
  const R=v=>'R$ '+Math.round(v).toLocaleString('pt-BR');
  const fmtD=(ds,off)=>{if(!ds)return'—';const d=new Date(ds+'T12:00:00');d.setDate(d.getDate()+off);return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'})};
  const thumb=id=>`https://drive.google.com/thumbnail?id=${id}&sz=w800`;

  // recalcula
  let cp=0,ct=0,ch=0;
  const det=D.dias.map((d,i)=>{
    const r=ROT.find(x=>x.id===d.rot),h=HOSP.find(x=>x.id===d.hosp);
    let vp=0;
    if(D.car==='agencia'){const f=Math.min(Math.max(D.np,3),16);vp=r.ag[f]||0;}
    else vp=D.sub==='c4'?r.c4||0:r.c8||0;
    const vt=(r.taxa||0)*D.np;
    let vh=h.g||0;d.qts.forEach(q=>{vh+=(q.t==='single'?h.s:q.t==='casal'?h.c:h.t||0)*q.q});
    cp+=vp;ct+=vt;ch+=vh;
    return{i:i+1,r,h,d,vp,vt,vh};
  });
  const tot=cp+ct+ch,ppp=D.np>0?tot*(1+D.mk/100)/D.np:0;
  const temHosp=det.some(d=>d.vh>0);
  const badge=D.nome?(D.di?`${D.nome} — ${fmtD(D.di,0)} → ${D.df?fmtD(D.df,0):'?'}`:D.nome):'Novo Roteiro';

  // CAPA
  let html=`
  <div class="pdf-capa">
    <div class="pdf-logo-c"><img src="${LOGO}" onerror="this.style.display='none'"></div>
    <div><div class="pdf-capa-h2">LENÇÓIS TREKKING</div>
    <div class="pdf-capa-p">A vida começa fora da rota</div>
    <div class="pdf-badge">${badge}</div></div>
  </div>
  <div class="pdf-s">
    <div class="pdf-tag">DESCRIÇÃO DO ROTEIRO</div>
    <table class="pt"><thead><tr><th>Data</th><th>Passeio</th><th>Pousada</th><th>Cidade</th></tr></thead>
    <tbody>${det.map(d=>`<tr><td>${fmtD(D.di,d.i-1)}</td><td>${d.r.nome}</td><td>${d.h.nome}</td><td>${d.h.local}</td></tr>`).join('')}</tbody></table>
  </div>
  <div class="pdf-s">
    <div class="pdf-tag">PREÇO E PAGAMENTO</div>
    <div class="pdf-p-lbl">PREÇO POR PESSOA</div>
    <div class="pdf-p-val">${R(ppp)}</div>
    <div style="font-size:9pt;color:#555;margin-top:8px">Para reserva, é necessário o pagamento de <strong>30%</strong> do valor total.<br>O saldo restante deverá ser pago até <strong>10 dias antes</strong> do início da viagem.<br><br>Aceitamos: PIX · Transferência · Cartão em até 6x (+3%) · Parcelamento no PIX</div>
  </div>
  <div class="pdf-s">
    <div class="pdf-tag">INCLUSO / NÃO INCLUSO</div>
    <ul class="pdf-ul">
      <li>Guia experiente</li><li>Seguro Aventura ROCA</li>
      <li>Taxa de entrada nos atrativos</li><li>Transporte em carro da agência</li>
      ${temHosp?'<li>Hospedagem conforme roteiro</li>':''}
    </ul>
  </div>
  <div class="pdf-s">
    <div class="pdf-tag">CHECK-IN / CHECK-OUT</div>
    <div style="font-size:9pt;color:#444;line-height:1.6">Caso haja hospedagem inclusa em seu pacote, o horário de <strong>Check-in é 14:00h</strong> e o de <strong>Check-out 12:00h</strong>.<br>Caso o viajante chegue antes de 14:00h, por favor nos informar para avisarmos a hospedagem, que guardará seus pertences e também oferecerá um café da manhã extra no dia do check-in (a ser pago diretamente para a pousada).</div>
  </div>
  <div class="pdf-s">
    <div class="pdf-tag">POLÍTICA DE CANCELAMENTO</div>
    <div style="font-size:9pt;color:#444;line-height:1.7">
      <ul class="pdf-ul" style="margin-bottom:6px">
        <li>Com até 60 dias de antecedência do início do roteiro, devolveremos o valor total pago para reserva.</li>
        <li>O viajante que desejar trocar ou cancelar algum passeio já reservado, precisará solicitar a troca com no mínimo 60 dias de antecedência. A troca será feita com acerto da diferença de valores, se tivermos disponibilidade. Após 60 dias, não há devolução de quantia paga.</li>
      </ul>
      <div style="font-weight:700;color:#1a1a1a;margin-top:6px;margin-bottom:3px">Observações</div>
      <ul class="pdf-ul">
        <li>Os passeios são em grupos.</li>
        <li>A ordem dos passeios ou o próprio passeio poderá ser alterado por motivos de força maior (chuva, condições de estrada) visando oferecer máxima segurança, ou para casamento de datas com outros viajantes.</li>
        <li>As hospedagens na região sul da Chapada podem ser modificadas por motivos de força maior ou disponibilidade nas pousadas parceiras.</li>
      </ul>
    </div>
  </div>`;

  // PÁGINAS POR DIA
  det.forEach(d=>{
    const fotos=d.r.fotos||[];
    const fotoHtml=fotos.length===0?'':fotos.length===1?
      `<div style="width:100%;height:320px;overflow:hidden;border-radius:6px;margin-bottom:10px"><img src="${thumb(fotos[0])}" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.style.display='none'"></div>`:
      `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">${fotos.map(fid=>`<div style="height:260px;overflow:hidden;border-radius:6px"><img src="${thumb(fid)}" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.style.display='none'"></div>`).join('')}</div>`;

    html+=`<div class="pdf-page-dia">
      <div style="background:linear-gradient(135deg,#e8601c,#b84510);padding:12px 15px;display:flex;justify-content:space-between;align-items:center;border-radius:6px;margin-bottom:12px">
        <div><div style="font-size:8pt;color:rgba(255,255,255,.8);text-transform:uppercase;letter-spacing:.5px;font-weight:700">DIA ${d.i}</div>
        <div style="font-family:'Playfair Display',serif;font-size:11pt;color:#fff;margin-top:1px">${d.r.nome}</div></div>
        <div style="text-align:right;font-size:8pt;color:rgba(255,255,255,.85)">${fmtD(D.di,d.i-1)}</div>
      </div>
      ${fotoHtml}
      <div style="font-size:9pt;color:#333;white-space:pre-line;margin-bottom:10px;line-height:1.6">${d.r.pt}</div>
      ${d.h.id!==20?`<div style="background:#f9f6f1;border:1px solid #e0d8cc;border-radius:6px;padding:10px 12px;margin-top:8px">
        <div style="font-size:7.5pt;font-weight:700;color:#e8601c;text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px">🏨 Hospedagem da noite</div>
        <div style="font-size:9pt;font-weight:600;color:#1a1a1a">${d.h.nome}</div>
        <div style="font-size:8pt;color:#666;margin-top:2px">${d.h.local} · ${d.d.qts.map(q=>`${q.q}x ${q.t}`).join(', ')}</div>
      </div>`:''}
      <div style="margin-top:14px;padding-top:8px;border-top:1px solid #e0d8cc;display:flex;justify-content:space-between">
        <div style="font-size:7pt;color:#aaa">Lençóis Trekking · A vida começa fora da rota</div>
        <div style="font-size:7pt;color:#aaa">Dia ${d.i} de ${det.length}</div>
      </div>
    </div>`;
  });

  document.getElementById('conteudo').innerHTML=html;
}
</script>
</body>
</html>
